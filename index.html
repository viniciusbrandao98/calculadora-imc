<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IMC</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main>
        <div class="container">
            <div class="form-section">
                <h1>Índice de Massa Corporal (IMC) Calculadora</h1>
                <div>
                    <p>sua altura(cm) :</p>
                    <input type="number" class="input" id="altura" value="" placeholder="Insira sua altura aqui">
                </div>
                <div>
                    <p>Seu peso (kg) :</p>
                    <input type="number" class="input" id="peso" value="" placeholder="Insina seu peso aqui">
                </div>
                <button class="btn" id="btn">Calcular IMC</button>
                <div>
                    <p>Seu IMC :</p>
                    <input disabled type="number" class="input" id="resultado-imc" >
                </div>
                <div>
                    <h2>Condição de peso: <span id="condicao-peso"></span></h2>     
                </div>
            </div>
            <div class="image-container">
                <img src="assets/IMC.jpg" alt="tabela de IMC">
            </div>
        </div>
    </main>
    <script src="index.js"></script>
</body>
</html>
